language = "C"
include_guard = "STURDY_ENGINE_H"
autogen_warning = "/* Generated by cbindgen from crates/sturdy-engine-ffi. Do not edit by hand. */"
cpp_compat = true
usize_is_size_t = true
style = "both"
documentation = true

[parse]
parse_deps = false
include = ["sturdy-engine-ffi"]

[export]
prefix = ""
include = [
    "gfx_device_t",
    "gfx_image_t",
    "gfx_buffer_t",
    "gfx_shader_t",
    "gfx_frame_t",
    "gfx_result_t",
    "gfx_format_t",
    "gfx_image_usage_t",
    "gfx_buffer_usage_t",
    "gfx_shader_stage_t",
    "gfx_queue_type_t",
    "gfx_access_t",
    "gfx_rg_state_t",
    "gfx_caps_t",
    "gfx_image_desc_t",
    "gfx_buffer_desc_t",
    "gfx_shader_desc_t",
    "gfx_subresource_range_t",
    "gfx_resource_use_t",
    "gfx_buffer_use_t",
    "gfx_pass_desc_t",
    "gfx_create_device",
    "gfx_destroy_device",
    "gfx_get_caps",
    "gfx_create_image",
    "gfx_destroy_image",
    "gfx_create_buffer",
    "gfx_destroy_buffer",
    "gfx_create_shader",
    "gfx_destroy_shader",
    "gfx_begin_frame",
    "gfx_destroy_frame",
    "gfx_frame_import_image",
    "gfx_frame_import_buffer",
    "gfx_frame_add_pass",
    "gfx_frame_flush",
    "gfx_frame_present",
    "gfx_frame_wait",
]
